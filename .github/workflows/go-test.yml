name: go-test

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: go-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false
      - name: Go Test
        run: go test ./...