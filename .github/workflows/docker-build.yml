name: docker-build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Run go test
        run: go test ./... -v
      - name: Build linux/amd64 binary
        run: |
          mkdir -p dist/linux-amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -buildvcs=false -ldflags "-s -w" -o dist/linux-amd64/proxy ./cmd/proxy
      - name: Build linux/arm64 binary
        run: |
          mkdir -p dist/linux-arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -buildvcs=false -ldflags "-s -w" -o dist/linux-arm64/proxy ./cmd/proxy
      - name: Build windows/amd64 binary
        run: |
          mkdir -p dist/windows-amd64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -buildvcs=false -ldflags "-s -w" -o dist/windows-amd64/proxy.exe ./cmd/proxy
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: proxy-windows-amd64
          path: dist/windows-amd64/proxy.exe
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository }}:latest
